<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Things Bridge</title>
    <style>
        :root {
            --bg: #ffffff;
            --bg-secondary: #f5f5f7;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #4a90d9;
            --accent-hover: #3a7bc8;
            --border: #e5e5e7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .setup-card {
            background: var(--bg);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
            width: 380px;
        }

        .setup-card h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .setup-card .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .field {
            margin-bottom: 16px;
            text-align: left;
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .field input:focus {
            border-color: var(--accent);
        }

        .error {
            color: #e55;
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
        }

        .error.visible {
            display: block;
        }

        .status {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
        }

        .status.visible {
            display: block;
        }

        button {
            padding: 10px 32px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        button:hover { background: var(--accent-hover); }
        button:disabled { opacity: 0.6; cursor: default; }
    </style>
</head>
<body>
    <div class="setup-card">
        <h2>Things Bridge</h2>
        <p class="subtitle">Connect to your Things Bridge server.</p>
        <div class="field">
            <label for="server-url">Server URL</label>
            <input type="url" id="server-url" placeholder="http://192.168.1.100:8787" autofocus>
        </div>
        <div class="field" id="mac-field" style="display:none">
            <label for="mac-address">MAC Address <span style="font-weight:400">(auto-detected for Wake-on-LAN)</span></label>
            <input type="text" id="mac-address" placeholder="AA:BB:CC:DD:EE:FF" readonly>
        </div>
        <div class="error" id="error"></div>
        <div class="status" id="status"></div>
        <button id="connect-btn">Connect</button>
    </div>

    <script>
        const { invoke } = window.__TAURI__.core;

        const urlInput = document.getElementById("server-url");
        const macInput = document.getElementById("mac-address");
        const errorEl = document.getElementById("error");
        const statusEl = document.getElementById("status");
        const connectBtn = document.getElementById("connect-btn");

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.classList.add("visible");
            statusEl.classList.remove("visible");
        }

        function showStatus(msg) {
            statusEl.textContent = msg;
            statusEl.classList.add("visible");
            errorEl.classList.remove("visible");
        }

        function hideMessages() {
            errorEl.classList.remove("visible");
            statusEl.classList.remove("visible");
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function tryWakeAndConnect(url, mac) {
            showStatus("Waking server...");
            try {
                await invoke("wake_server", { macAddress: mac });
            } catch (e) {
                showError("Failed to send wake packet: " + e);
                return false;
            }
            for (let i = 0; i < 15; i++) {
                await sleep(1000);
                showStatus(`Waiting for server... (${i + 1}s)`);
                const up = await invoke("check_server", { url });
                if (up) return true;
            }
            return false;
        }

        async function connect() {
            const url = urlInput.value.trim().replace(/\/+$/, "");
            if (!url) {
                showError("Please enter a server URL.");
                return;
            }
            const mac = macInput.value.trim();

            connectBtn.disabled = true;
            connectBtn.textContent = "Connecting...";
            hideMessages();

            try {
                let reachable = await invoke("check_server", { url });

                if (!reachable && mac) {
                    reachable = await tryWakeAndConnect(url, mac);
                }

                if (!reachable) {
                    showError("Cannot reach server. Check the URL and try again.");
                    return;
                }

                // Auto-discover and save MAC for future WOL
                try {
                    const discoveredMac = await invoke("fetch_server_mac", { url });
                    if (discoveredMac) {
                        await invoke("save_mac_address", { macAddress: discoveredMac });
                    }
                } catch (_) { /* non-critical */ }

                showStatus("Connected! Loading...");
                await invoke("connect_to_server", { url });
            } catch (e) {
                showError("Connection failed: " + e);
            } finally {
                connectBtn.disabled = false;
                connectBtn.textContent = "Connect";
            }
        }

        connectBtn.addEventListener("click", connect);
        urlInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") connect();
        });

        // On load, check for saved URL and auto-connect
        async function init() {
            try {
                const saved = await invoke("get_server_url");
                const savedMac = await invoke("get_mac_address");
                if (savedMac) {
                    macInput.value = savedMac;
                    document.getElementById("mac-field").style.display = "";
                }

                if (saved) {
                    urlInput.value = saved;
                    showStatus("Reconnecting...");
                    connectBtn.disabled = true;

                    let reachable = await invoke("check_server", { url: saved });

                    if (!reachable && savedMac) {
                        reachable = await tryWakeAndConnect(saved, savedMac);
                    }

                    if (reachable) {
                        await invoke("connect_to_server", { url: saved });
                        return;
                    }
                    showError("Saved server not reachable. Update the URL and reconnect.");
                    connectBtn.disabled = false;
                }
            } catch (e) {
                console.error("Init error:", e);
                connectBtn.disabled = false;
            }
        }

        init();
    </script>
</body>
</html>
