<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Things Bridge</title>
    <style>
        :root {
            --bg: #ffffff;
            --bg-secondary: #f5f5f7;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #4a90d9;
            --accent-hover: #3a7bc8;
            --border: #e5e5e7;
        }

        [data-theme="dark"] {
            --bg: #1c1c1e;
            --bg-secondary: #2c2c2e;
            --text-primary: #f5f5f7;
            --text-secondary: #98989f;
            --accent: #5a9ee6;
            --accent-hover: #6db0f5;
            --border: #3a3a3c;
            --danger: #ff6b6b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        #setup-view {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #server-view {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        #menu-bar {
            display: flex;
            align-items: center;
            padding: 6px 12px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        #menu-bar button {
            width: auto;
            padding: 5px 14px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 400;
            border-radius: 6px;
        }

        #menu-bar button:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        #theme-toggle-btn {
            width: 32px;
            height: 32px;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--bg-secondary);
        }

        #theme-toggle-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        #server-frame {
            width: 100%;
            flex: 1;
            border: none;
        }

        .setup-card {
            background: var(--bg);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.15);
            width: 380px;
        }

        .setup-card h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .setup-card .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .field {
            margin-bottom: 16px;
            text-align: left;
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .field input:focus {
            border-color: var(--accent);
        }

        .error {
            color: var(--danger, #e55);
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
        }

        .error.visible {
            display: block;
        }

        .status {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
        }

        .status.visible {
            display: block;
        }

        button {
            padding: 10px 32px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        button:hover { background: var(--accent-hover); }
        button:disabled { opacity: 0.6; cursor: default; }
    </style>
</head>
<body>
    <div id="setup-view">
        <div class="setup-card">
            <h2>Things Bridge</h2>
            <p class="subtitle">Connect to your Things Bridge server.</p>
            <div class="field">
                <label for="server-url">Server URL</label>
                <input type="url" id="server-url" placeholder="http://192.168.1.100:8787" autofocus>
            </div>
            <div class="field" id="mac-field" style="display:none">
                <label for="mac-address">MAC Address <span style="font-weight:400">(auto-detected for Wake-on-LAN)</span></label>
                <input type="text" id="mac-address" placeholder="AA:BB:CC:DD:EE:FF" readonly>
            </div>
            <div class="error" id="error"></div>
            <div class="status" id="status"></div>
            <button id="connect-btn">Connect</button>
        </div>
    </div>

    <div id="server-view">
        <div id="menu-bar">
            <button id="change-server-btn">Change Server</button>
            <span style="flex:1"></span>
            <button id="theme-toggle-btn" title="Toggle dark mode"></button>
        </div>
        <iframe id="server-frame"></iframe>
    </div>

    <script>
        const { invoke } = window.__TAURI__.core;
        const { listen } = window.__TAURI__.event;

        const THEME_KEY = "things_bridge_theme";

        function getPreferredTheme() {
            const saved = localStorage.getItem(THEME_KEY);
            if (saved) return saved;
            return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }

        const SUN_ICON = '<svg viewBox="0 0 24 24"><path d="M12 7a5 5 0 100 10 5 5 0 000-10zm0-3a1 1 0 001-1V1a1 1 0 00-2 0v2a1 1 0 001 1zm0 18a1 1 0 00-1 1v2a1 1 0 002 0v-2a1 1 0 00-1-1zM4.22 5.64l1.42-1.42a1 1 0 00-1.42-1.42L2.81 4.22a1 1 0 001.41 1.42zM18.36 19.78l1.42-1.42a1 1 0 00-1.42-1.42l-1.41 1.42a1 1 0 001.41 1.42zM4 12a1 1 0 00-1-1H1a1 1 0 000 2h2a1 1 0 001-1zm19-1h-2a1 1 0 000 2h2a1 1 0 000-2zM5.64 19.78a1 1 0 001.42-1.42l-1.42-1.42a1 1 0 00-1.42 1.42l1.42 1.42zM19.78 5.64a1 1 0 00-1.42-1.42l-1.42 1.42a1 1 0 001.42 1.42l1.42-1.42z"/></svg>';
        const MOON_ICON = '<svg viewBox="0 0 24 24"><path d="M21.64 13a1 1 0 00-1.05-.14 8.05 8.05 0 01-3.37.73A8.15 8.15 0 019.08 5.49a8.59 8.59 0 01.25-2 1 1 0 00-1.33-1.17A10 10 0 1022.78 14.05a1 1 0 00-1.14-1.05z"/></svg>';

        function applyTheme(theme, notifyIframe) {
            document.documentElement.setAttribute("data-theme", theme);
            const btn = document.getElementById("theme-toggle-btn");
            if (btn) btn.innerHTML = theme === "dark" ? SUN_ICON : MOON_ICON;
            // Update native title bar
            invoke("set_window_theme", { theme }).catch(() => {});
            // Push theme into iframe, but not if iframe initiated it
            if (notifyIframe) {
                const frame = document.getElementById("server-frame");
                if (frame && frame.contentWindow) {
                    frame.contentWindow.postMessage({ type: "set-theme", theme }, "*");
                }
            }
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute("data-theme") || "light";
            const next = current === "dark" ? "light" : "dark";
            localStorage.setItem(THEME_KEY, next);
            applyTheme(next, true);
        }

        // Apply theme immediately
        applyTheme(getPreferredTheme(), false);

        // Listen for theme changes from the iframe — don't push back
        window.addEventListener("message", (e) => {
            if (e.data && e.data.type === "theme-change") {
                localStorage.setItem(THEME_KEY, e.data.theme);
                applyTheme(e.data.theme, false);
            }
        });

        const setupView = document.getElementById("setup-view");
        const serverView = document.getElementById("server-view");
        const serverFrame = document.getElementById("server-frame");
        const urlInput = document.getElementById("server-url");
        const macInput = document.getElementById("mac-address");
        const errorEl = document.getElementById("error");
        const statusEl = document.getElementById("status");
        const connectBtn = document.getElementById("connect-btn");

        function showSetup() {
            serverView.style.display = "none";
            serverFrame.src = "";
            setupView.style.display = "flex";
            connectBtn.disabled = false;
            connectBtn.textContent = "Connect";
            hideMessages();
        }

        function showServer(url) {
            setupView.style.display = "none";
            serverFrame.src = url;
            serverView.style.display = "flex";
        }

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.classList.add("visible");
            statusEl.classList.remove("visible");
        }

        function showStatus(msg) {
            statusEl.textContent = msg;
            statusEl.classList.add("visible");
            errorEl.classList.remove("visible");
        }

        function hideMessages() {
            errorEl.classList.remove("visible");
            statusEl.classList.remove("visible");
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function tryWakeAndConnect(url, mac) {
            showStatus("Waking server...");
            try {
                await invoke("wake_server", { macAddress: mac });
            } catch (e) {
                showError("Failed to send wake packet: " + e);
                return false;
            }
            for (let i = 0; i < 15; i++) {
                await sleep(1000);
                showStatus(`Waiting for server... (${i + 1}s)`);
                const up = await invoke("check_server", { url });
                if (up) return true;
            }
            return false;
        }

        async function connectToServer(url) {
            const mac = macInput.value.trim();

            connectBtn.disabled = true;
            connectBtn.textContent = "Connecting...";
            hideMessages();

            try {
                let reachable = await invoke("check_server", { url });

                if (!reachable && mac) {
                    reachable = await tryWakeAndConnect(url, mac);
                }

                if (!reachable) {
                    showError("Cannot reach server. Check the URL and try again.");
                    return;
                }

                // Auto-discover and save MAC for future WOL
                try {
                    const discoveredMac = await invoke("fetch_server_mac", { url });
                    if (discoveredMac) {
                        await invoke("save_mac_address", { macAddress: discoveredMac });
                    }
                } catch (_) { /* non-critical */ }

                await invoke("save_server_url", { url });
                showServer(url);
            } catch (e) {
                showError("Connection failed: " + e);
            } finally {
                connectBtn.disabled = false;
                connectBtn.textContent = "Connect";
            }
        }

        async function connect() {
            const url = urlInput.value.trim().replace(/\/+$/, "");
            if (!url) {
                showError("Please enter a server URL.");
                return;
            }
            await connectToServer(url);
        }

        connectBtn.addEventListener("click", connect);
        urlInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") connect();
        });

        document.getElementById("theme-toggle-btn").addEventListener("click", toggleTheme);

        // Push theme to iframe once it loads (direct postMessage, not via applyTheme)
        serverFrame.addEventListener("load", () => {
            const theme = document.documentElement.getAttribute("data-theme") || "light";
            if (serverFrame.contentWindow) {
                serverFrame.contentWindow.postMessage({ type: "set-theme", theme }, "*");
            }
        });

        // "Change Server" from HTML button or Rust menu event
        document.getElementById("change-server-btn").addEventListener("click", showSetup);
        listen("change-server", () => showSetup());

        // On load, check for saved URL and auto-connect
        async function init() {
            try {
                const saved = await invoke("get_server_url");
                const savedMac = await invoke("get_mac_address");
                if (savedMac) {
                    macInput.value = savedMac;
                    document.getElementById("mac-field").style.display = "";
                }

                if (saved) {
                    urlInput.value = saved;
                    showStatus("Reconnecting...");
                    connectBtn.disabled = true;

                    let reachable = await invoke("check_server", { url: saved });

                    if (!reachable && savedMac) {
                        reachable = await tryWakeAndConnect(saved, savedMac);
                    }

                    if (reachable) {
                        await invoke("save_server_url", { url: saved });
                        showServer(saved);
                        return;
                    }
                    showError("Saved server not reachable. Update the URL and reconnect.");
                    connectBtn.disabled = false;
                }
            } catch (e) {
                console.error("Init error:", e);
                connectBtn.disabled = false;
            }
        }

        init();
    </script>
</body>
</html>
